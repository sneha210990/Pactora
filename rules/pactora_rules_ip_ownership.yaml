fallback_ladder:
  ideal: Present assignment of foreground IP (recast as exclusive licence for DE/FR), in writing and signed,
    with background IP retained and a licence-back to the assignor; moral rights waived where the jurisdiction
    allows.
  acceptable: Assignment/exclusive licence of foreground IP with duration and territory expressly stated
    (avoids India s.19 defaults), software handled under the local employee exception.
  walk_away: Blanket assignment of all background and future IP, no writing/signature, moral-rights waiver
    relied on in a jurisdiction that forbids it, contractor work with no assignment at all.
output_contract:
  required_fields:
  - rule_id
  - clause_id
  - jurisdiction
  - severity
  - rule_type
  - stability
  - legal_basis
  - engine_interpretation
  - evidence_span
  rules:
  - every finding must carry the rule_id it fired from
  - legal_basis is reported verbatim; the model must not invent authorities
  - engine_interpretation must not assert invalidity for litigation_risk / negotiation_risk rules
  - 'respect excluded_when: do not raise a finding where its excluded_when condition holds'
  - evidence_span must quote the contract text that triggered the rule
  - the engine must not serve a rule whose meta.status is not 'verified' or is past due
schema_version: 2
cadence_by_stability:
  settled: 24
  context_sensitive: 12
  evolving: 3
  jurisdictionally_variable: 6
