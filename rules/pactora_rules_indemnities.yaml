fallback_ladder:
  ideal: Mutual, capped indemnities limited to defined third-party claim categories (IP infringement,
    data breach, death/personal injury), indemnitor controls the defence, cap expressly applies.
  acceptable: Indemnities capped at the aggregate liability cap, limited to third-party claims, carve-outs
    only for fraud and (where mandatory) intent.
  walk_away: Uncapped, one-sided indemnity outside the cap, covering first-party losses and the indemnitee's
    own negligence or fraud.
output_contract:
  required_fields:
  - rule_id
  - clause_id
  - jurisdiction
  - severity
  - rule_type
  - stability
  - legal_basis
  - engine_interpretation
  - evidence_span
  rules:
  - every finding must carry the rule_id it fired from
  - legal_basis is reported verbatim; the model must not invent authorities
  - engine_interpretation must not assert invalidity for litigation_risk / negotiation_risk rules
  - 'respect excluded_when: do not raise a finding where its excluded_when condition holds'
  - evidence_span must quote the contract text that triggered the rule
  - the engine must not serve a rule whose meta.status is not 'verified' or is past due
schema_version: 2
cadence_by_stability:
  settled: 24
  context_sensitive: 12
  evolving: 3
  jurisdictionally_variable: 6
