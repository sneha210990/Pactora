fallback_ladder:
  ideal: 'Mutual rights: termination for cause with a defined cure period, termination for convenience
    on reasonable notice, a clear survival clause, no reliance on an insolvency-only trigger, plus transition
    assistance and orderly wind-down.'
  acceptable: Termination for cause (with cure) and for convenience (reasonable notice); survival of confidentiality,
    IP and liability; any insolvency trigger understood to be limited by local insolvency law.
  walk_away: Immediate termination for any breach with no cure, one-sided rights, a disproportionate termination
    penalty, sole reliance on an insolvency trigger local law will not enforce, and no survival clause.
output_contract:
  required_fields:
  - rule_id
  - clause_id
  - jurisdiction
  - severity
  - rule_type
  - stability
  - legal_basis
  - engine_interpretation
  - evidence_span
  rules:
  - every finding must carry the rule_id it fired from
  - legal_basis is reported verbatim; the model must not invent authorities
  - engine_interpretation must not assert invalidity for litigation_risk / negotiation_risk rules
  - 'respect excluded_when: do not raise a finding where its excluded_when condition holds'
  - evidence_span must quote the contract text that triggered the rule
  - the engine must not serve a rule whose meta.status is not 'verified' or is past due
schema_version: 2
cadence_by_stability:
  settled: 24
  context_sensitive: 12
  evolving: 3
  jurisdictionally_variable: 6
